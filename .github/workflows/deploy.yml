name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DEBUG: "True"
  SECRET_KEY: "test-secret-key-for-ci-cd-pipeline"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  DB_NAME: "test_db"
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"
  DB_HOST: "localhost"
  DB_PORT: "5432"
  CELERY_BROKER_URL: "redis://localhost:6379/0"
  TELEGRAM_BOT_TOKEN: "test-token"
  JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "60"
  JWT_REFRESH_TOKEN_LIFETIME_DAYS: "1"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  STATIC_URL: "/static/"
  STATIC_ROOT: "staticfiles"
  MEDIA_URL: "/media/"
  MEDIA_ROOT: "media"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r habit_tracker/requirements.txt
        pip install pytest pytest-django pytest-cov

    - name: Run migrations
      working-directory: habit_tracker
      run: python manage.py migrate

    - name: Run tests
      working-directory: habit_tracker
      run: pytest --cov=. --cov-report=xml || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/rest_cw/habit_tracker
          
          git pull origin ${{ github.ref_name }}
          
          source /home/ubuntu/venv/bin/activate
          
          pip install -r requirements.txt
          
          python manage.py migrate
          
          python manage.py collectstatic --noinput
          
          sudo systemctl restart gunicorn
          sudo supervisorctl restart celery
          sudo supervisorctl restart celery-beat
          sudo systemctl restart nginx